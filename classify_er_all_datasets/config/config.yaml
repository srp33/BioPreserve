scripts_dir: "."
adjust_script: "../../adjust/adjust.R"

adjuster: ["gmm", "min_mean", "naive", "log_combat", "log_transformed"] # mnn
dataset_ids:
  - "gse19615"
  - "gse20194"
  - "gse20271"
  - "gse23720"
  - "gse25055"
  - "gse25065"
  - "gse31448"
  - "gse45255"
  - "gse58644"
  - "gse62944_tumor"
  - "gse76275"
  - "gse81538"
  - "gse96058_hiseq"
