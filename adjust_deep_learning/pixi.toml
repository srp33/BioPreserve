[workspace]
name = "biopreserve-deep-learning"
version = "0.1.0"
description = "Deep learning batch correction models (ICVAE, VFAE, AutoClass, Wasserstein)"
channels = ["conda-forge", "pytorch", "nvidia"]
platforms = ["linux-64"]

[dependencies]
# === Python Base ===
python = ">=3.10,<3.13"

# === Deep Learning Frameworks ===
pytorch = "*"
pytorch-cuda = "12.1.*"  # Adjust CUDA version as needed
tensorflow = ">=2.10"

# === Configuration Management ===
hydra-core = ">=1.3.0"
omegaconf = ">=2.3.0"

# === Data Science ===
numpy = "*"
pandas = "*"
scikit-learn = "*"
matplotlib = "*"

# === Type Checking & Validation ===
jaxtyping = "*"
beartype = "*"

[tasks]
# Test deep learning packages
test-torch = "python -c 'import torch; print(f\"✓ PyTorch {torch.__version__}\"); print(f\"  CUDA available: {torch.cuda.is_available()}\")'"
test-tf = "python -c 'import tensorflow as tf; print(f\"✓ TensorFlow {tf.__version__}\")'"
test-hydra = "python -c 'import hydra; from omegaconf import OmegaConf; print(\"✓ Hydra and OmegaConf loaded\")'"
test-types = "python -c 'from jaxtyping import Float; from beartype import beartype; print(\"✓ Type checking packages loaded\")'"
test-all = { depends-on = ["test-torch", "test-tf", "test-hydra", "test-types"] }

# Run models
run-icvae = "python run_icvae.py"
run-vfae = "python run_vfae.py"
run-model = "python run_model.py"

[activation]
env = { CUDA_VISIBLE_DEVICES = "0" }
