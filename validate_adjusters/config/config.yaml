# config.yaml

output_folder: "outputs"

# Metadata features from the main pipeline (shared across all adjusters)
X_train: "metadata/metadata_train.csv"
X_test: "metadata/metadata_test.csv"

# Gene selection: top N genes from selected_genes.csv are used as features
selected_genes: "adjusters/selected_genes.csv"
n_top_genes: 150

# Train/test split: rows where meta_source == train_source_value go to train, etc.
train_source_value: "gse62944_tumor"
test_source_value: "metabric"

# Adjusters: name -> {source: combined_path, train: gene_expr_train_path, test: gene_expr_test_path}
# source is the new combined (unsplit) file; train/test are generated by the split_adjusters rule.
adjusters:
  unadjusted:
    train: "adjusters/adjusted_bayesian_shift_scale_2studies_test_metabric_train_selected_genes.csv"
    test: "adjusters/unadjusted_bayesian_shift_scale_2studies_test_metabric_test_selected_genes.csv"
  bayesian_shift_scale:
    train: "adjusters/adjusted_bayesian_shift_scale_2studies_test_metabric_train_selected_genes.csv"
    test: "adjusters/adjusted_bayesian_shift_scale_2studies_test_metabric_test_selected_genes.csv"
  bayesian_effective_shift_only:
    train: "adjusters/adjusted_bayesian_effective_shift_only_2studies_test_metabric_train_selected_genes.csv"
    test: "adjusters/adjusted_bayesian_effective_shift_only_2studies_test_metabric_test_selected_genes.csv"
  mnn:
    source: "adjusters/mnn-2_studies-test_metabric.csv"
    train: "adjusters/mnn-2_studies-metabric-train.csv"
    test: "adjusters/mnn-2_studies-metabric-test.csv"
  min_mean:
    source: "adjusters/min_mean-2_studies-test_metabric.csv"
    train: "adjusters/min_mean-2_studies-metabric-train.csv"
    test: "adjusters/min_mean-2_studies-metabric-test.csv"
  log_transformed:
    source: "adjusters/log_transformed-2_studies-test_metabric.csv"
    train: "adjusters/log_transformed-2_studies-metabric-train.csv"
    test: "adjusters/log_transformed-2_studies-metabric-test.csv"
  log_combat:
    source: "adjusters/combat-2_studies-test_metabric.csv"
    train: "adjusters/combat-2_studies-metabric-train.csv"
    test: "adjusters/combat-2_studies-metabric-test.csv"
  gmm:
    source: "adjusters/gmm-2_studies-test_metabric.csv"
    train: "adjusters/gmm-2_studies-metabric-train.csv"
    test: "adjusters/gmm-2_studies-metabric-test.csv"

# Reference datasets used by DBA/oracle/analysis rules.
# These are the bayesian shift-scale adjuster outputs used as a shared baseline.
reference_train: "adjusters/adjusted_bayesian_shift_scale_2studies_test_metabric_train_selected_genes.csv"
reference_unadjusted_test: "adjusters/unadjusted_bayesian_shift_scale_2studies_test_metabric_test_selected_genes.csv"
reference_bayesian_test: "adjusters/adjusted_bayesian_shift_scale_2studies_test_metabric_test_selected_genes.csv"

# Metadata labels used for classification/regression targets
metadata_labels:
  - "meta_er_status"
  - "meta_menopause_status"
  - "meta_sex"
  - "meta_age_at_diagnosis"
  - "meta_chemotherapy"
  - "meta_histological_type"
  - "meta_her2_status"
  - "meta_age_at_diagnosis_combined_lt50"
  - "meta_age_at_diagnosis_combined_50_69"
  - "meta_age_at_diagnosis_combined_ge70"

# Metadata columns to treat as continuous targets (HistGradientBoostingRegressor + R²)
# All other metadata columns are treated as classification targets (MCC)
continuous_metadata:
  - "meta_age_at_diagnosis"

# Cross-validation settings for test set ceiling analysis
# Set to -1 or 0 for Leave-One-Out Cross-Validation (LOOCV)
# Set to positive integer for k-fold CV (e.g., 5, 10, 20)
cv_n_splits: 5
